name: Release

# Triggered on tag push (e.g. v6.3.0). Creates a GitHub Release with the title
# and body extracted from CHANGELOG.md. Single purpose, single job.
#
# npm publishing is handled locally via /pubpro protocol.
# Quality gates (build, test, lint) are handled by Championship CI on every push.
# Homebrew formula update is handled by homebrew.yml.
# This workflow does ONE thing: turn a CHANGELOG entry into a GitHub Release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  github-release:
    name: 🏷️ Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 🔢 Verify tag matches package.json version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::tag $VERSION does not match package.json version v$PKG_VERSION — refusing to release"
            exit 1
          fi
          echo "✓ tag $VERSION matches package.json (v$PKG_VERSION)"

      - name: 🟢 Verify Championship CI is green at this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          for attempt in $(seq 1 20); do
            RUN=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&per_page=20" \
              --jq '[.workflow_runs[] | select(.name == "Championship CI/CD")] | .[0]')
            STATUS=$(echo "$RUN" | jq -r '.status // "missing"')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion // ""')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "✓ Championship CI green at $SHA"
                exit 0
              fi
              echo "::error::Championship CI not green at $SHA (conclusion=$CONCLUSION) — refusing to release"
              exit 1
            fi

            echo "⏳ Championship CI status=$STATUS at $SHA (attempt $attempt/20) — waiting 30s"
            sleep 30
          done
          echo "::error::Championship CI did not complete within 10 minutes — refusing to release"
          exit 1

      - name: 📝 Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"

          # Pre-release detection (alpha/beta/rc in tag)
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          # Strip the leading v — CHANGELOG headings use [6.3.0] not [v6.3.0]
          BARE="${VERSION#v}"

          # Title: capture optional " — Edition Name" trailer from the heading
          # Heading format: "## [6.3.0] - 2026-04-27 — The Ghostty-Inspired Edition"
          TITLE_LINE=$(grep "^## \[$BARE\]" CHANGELOG.md | head -1)
          EDITION=$(echo "$TITLE_LINE" | sed -n 's/.*— \(.*\)$/\1/p')
          if [ -n "$EDITION" ]; then
            TITLE="$VERSION — $EDITION"
          else
            TITLE="$VERSION"
          fi

          # Body: the lines between this version's heading and the next "## [" heading
          BODY=$(sed -n "/^## \[$BARE\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d')
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](./CHANGELOG.md) for changes in $VERSION."
          fi

          {
            echo "version=$VERSION"
            echo "prerelease=$PRERELEASE"
            echo "title=$TITLE"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🏷️ Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.version }}
          name: ${{ steps.notes.outputs.title }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.notes.outputs.prerelease == 'true' }}
